services:
  - type: web
    name: line-dashboard
    runtime: python
    rootDir: apps/line-dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_GROUP_ID
        sync: false
