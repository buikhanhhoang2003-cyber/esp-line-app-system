<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Line Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <h1>Line Notify Dashboard</h1>
    <p id="status" class="status-text">Loading token status...</p>

    <section class="sensor-panel" aria-labelledby="sensor-title">
      <div class="sensor-panel-head">
        <h2 id="sensor-title">Sensor Sample</h2>
        <button type="button" id="refresh-sample" class="secondary-btn">Refresh sample</button>
      </div>
      <div class="sensor-grid">
        <article class="sensor-card sensor-temp">
          <p class="sensor-label">Temperature</p>
          <p class="sensor-value"><span id="sample-temp">--</span><span class="sensor-unit">&deg;C</span></p>
        </article>
        <article class="sensor-card sensor-humid">
          <p class="sensor-label">Humidity</p>
          <p class="sensor-value"><span id="sample-humidity">--</span><span class="sensor-unit">%</span></p>
        </article>
        <article class="sensor-card sensor-soil">
          <p class="sensor-label">Soil Moisture</p>
          <p class="sensor-value"><span id="sample-soil">--</span><span class="sensor-unit">%</span></p>
        </article>
      </div>
      <button type="button" id="use-sample" class="secondary-btn">Use this sample in message</button>
    </section>

    <form id="notify-form">
      <label for="target-type">Send to</label>
      <select id="target-type">
        <option value="user">User (push)</option>
        <option value="group">Group (push to group id)</option>
        <option value="broadcast">Broadcast (all followers)</option>
      </select>

      <label for="target-id" id="target-label">User / Group ID</label>
      <input id="target-id" placeholder="Enter User ID (U...) or Group ID (C...)" />

      <label for="message">Message</label>
      <textarea id="message" rows="4" placeholder="Type a message to send"></textarea>

      <button type="submit">Send to LINE</button>

      <div class="custom-action-row">
        <button type="button" id="toggle-custom" class="secondary-btn">Custom settings</button>
      </div>

      <div id="custom-panel" class="is-hidden">
        <small>Optional overrides (if left empty the server token/settings are used):</small>
        <label for="custom-user-id">Custom User ID</label>
        <input id="custom-user-id" placeholder="Optional: override user id (U...)" />

        <label for="custom-group-id">Custom Group ID</label>
        <input id="custom-group-id" placeholder="Optional: override group id (C...)" />

        <label for="custom-token">Channel Token</label>
        <input id="custom-token" placeholder="Optional: override channel access token" />
      </div>
    </form>

    <div id="result" aria-live="polite"></div>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
